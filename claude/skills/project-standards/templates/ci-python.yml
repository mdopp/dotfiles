# Catalog #2 — Python CI (lint + test), stack-adaptive template.
#
# Placeholders to fill when stamping into a repo:
#   <PYTHON_VERSION>   pinned runtime (match the package's requires-python), e.g. "3.11"
#   <RUFF_VERSION>     pin to the same ruff the pre-commit hook uses (lockstep)
#   <TEST_DIR>         directory of the installable+tested package, e.g. "voice-gatekeeper"
#   <TEST_EXTRA>       optional-deps extra that pulls in pytest etc., e.g. "test"
#   <PATHS>            path filters that should trigger CI (monorepo-friendly)
#
# Notes (ServiceBay learning):
#   - Pin the CI runtime; reproduce flakes locally with the SAME version.
#   - ruff default select is E4/E7/E9 + F (no line-length E501), so `ruff check`
#     stays quiet on long lines; `ruff format --check` owns wrapping.
#   - Lint must be 0 errors; warnings allowed but must not increase.
#   - Tests verify code correctness, not feature correctness — real-env /verify
#     is a separate gate for template/skill/migration paths.
name: ci

on:
  pull_request:
    paths: <PATHS>
  push:
    branches: [main]
    paths: <PATHS>

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "<PYTHON_VERSION>"
      - run: pip install ruff==<RUFF_VERSION>
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: pytest (<TEST_DIR>)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: <TEST_DIR>
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "<PYTHON_VERSION>"
      - run: pip install -e '.[<TEST_EXTRA>]'
      - run: pytest -q
